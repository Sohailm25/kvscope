open_questions:
  - >
    Can the capacity crossover be reproduced with larger N and under different
    engine configurations or models?
  - >
    How much does Modal cold-start and scheduling jitter affect TTFT variance?
    Client TTFT is noisy and prevents clean end-to-end latency claims.
  - >
    Do derived traces (OrderedDict simulation) faithfully model vLLM's actual
    internal block access patterns, or do scheduler/batching effects create
    divergence?
  - >
    Would kernel-level KV cache instrumentation (e.g., vLLM block manager hooks)
    change the replay policy ordering observed here?
  - >
    locality-shift cache-on prefill (14.619ms) slightly exceeds cache-off
    (13.758ms). Is this measurement noise or a real interference effect?

caveats:
  - "Small N: 2-4 runs per family. All claims are directional, not statistically significant."
  - "Traces are derived from request structure via OrderedDict simulation, not vLLM kernel instrumentation."
  - "Single engine (vLLM), single deployment target (Modal), single model family."
  - "Client TTFT is noisy; direct latency decomposition claims are not made."
  - "Replay capacity sweep is an offline budget exercise, not a live cache-resizing experiment."

confidence: directional
# Confidence scale: exploratory < directional < provisional < established
# "directional" means: consistent patterns observed across repeated small-N runs,
# but not enough data for statistical significance or production generalization.

workload_families:
  - aligned-prefix       # Positive reuse case
  - near-aligned-prefix  # Intermediate boundary-miss case
  - mixed-long-short     # Overlap and interference case
  - bursty-arrivals      # Reuse under burst pressure
  - eviction-ordering    # Policy separation case
  - hotset-scan          # Frequency-dominant case
  - locality-shift       # Recency-dominant case
  - locality-return      # Crossover case
  - no-overlap-control   # Negative control

